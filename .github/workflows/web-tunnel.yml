name: web-tunnel

on:
  workflow_dispatch:
    inputs:
      action:
        description: 'Action (start or stop)'
        required: false
        default: 'start'

concurrency:
  group: browser-tunnel
  cancel-in-progress: true

jobs:
  browser-session:
    runs-on: ubuntu-latest
    steps:
      - name: Process Stop Action
        if: github.event.inputs.action == 'stop'
        run: |
          echo "Workflow instances have been successfully stopped via concurrency rules."
          exit 0

      - name: Install dependencies
        if: github.event.inputs.action != 'stop'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends xvfb x11vnc fluxbox git websockify curl
          
          # Install Chrome
          wget -q https://dl.google.com/linux/direct/google-chrome-stable_current_amd64.deb
          sudo apt-get install -y ./google-chrome-stable_current_amd64.deb || true
          
          # Install Cloudflared
          wget -q https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb
          sudo dpkg -i cloudflared-linux-amd64.deb || sudo apt-get install -f -y

      - name: Setup noVNC
        if: github.event.inputs.action != 'stop'
        run: |
          git clone --depth 1 https://github.com/novnc/noVNC.git /tmp/noVNC
          cp /tmp/noVNC/vnc.html /tmp/noVNC/index.html

      - name: Get Password from Worker & Start Browser
        if: github.event.inputs.action != 'stop'
        run: |
          WORKER_URL="${{ vars.MY_WORKER_URL }}"
          HANDSHAKE="${{ vars.MY_WEB_HANDSHAKE_TOKEN }}"
          
          # Secure Handshake to get Password
          RESPONSE=$(curl -s -X POST "$WORKER_URL/my-browser/get-password" \
            -H "Authorization: Bearer $HANDSHAKE" \
            -H "Content-Type: application/json")
          
          VNC_PASS=$(echo $RESPONSE | grep -o '"password":"[^"]*' | cut -d'"' -f4)
          
          if [ -z "$VNC_PASS" ]; then
            echo "Failed to retrieve VNC password from worker endpoint."
            exit 1
          fi
          
          # Start Virtual Display and Window Manager
          export DISPLAY=:99
          Xvfb :99 -screen 0 1920x1080x24 &
          sleep 2
          fluxbox &
          sleep 2
          
          # Start Chrome Background
          google-chrome --no-sandbox --disable-dev-shm-usage --disable-gpu --new-window http://google.com &
          sleep 3
          
          # Setup VNC Password and Server
          echo "$VNC_PASS" | x11vnc -storepasswd -f /tmp/vncpwd
          x11vnc -display :99 -localhost -forever -shared -bg -rfbauth /tmp/vncpwd
          
          # Setup Websockify for noVNC
          nohup websockify --web /tmp/noVNC 6080 localhost:5900 &
          sleep 2

      - name: Start Cloudflare Tunnel and Register
        if: github.event.inputs.action != 'stop'
        run: |
          WORKER_URL="${{ vars.MY_WORKER_URL }}"
          HANDSHAKE="${{ vars.MY_WEB_HANDSHAKE_TOKEN }}"
          
          cloudflared tunnel --url http://localhost:6080 --logfile /tmp/tunnel.log &
          sleep 12
          
          TUNNEL_URL=$(grep -o 'https://[^ ]*\.trycloudflare\.com' /tmp/tunnel.log | head -1)
          echo "Tunnel started at: $TUNNEL_URL"
          
          if [ -n "$TUNNEL_URL" ]; then
            curl -s -X POST "$WORKER_URL/my-browser/register" \
              -H "Authorization: Bearer $HANDSHAKE" \
              -H "Content-Type: application/json" \
              -d "{\"tunnel_url\": \"$TUNNEL_URL\"}"
            echo "Registered tunnel seamlessly."
          else
            echo "WARNING: Cloudflare Tunnel failed."
          fi
          
          # Keep VM running for 6 hours (Max GitHub Action runtime limit)
          sleep 21600
