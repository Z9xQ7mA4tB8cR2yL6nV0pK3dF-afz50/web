name: web-tunnel

on:
  workflow_dispatch:

jobs:
  browser-tunnel:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install all dependencies in one go
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            xvfb \
            x11vnc \
            fluxbox \
            google-chrome-stable \
            python3-websockify &
          
          wget -q https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb &
          
          wait
          sudo dpkg -i cloudflared-linux-amd64.deb || sudo apt-get install -f -y

      - name: Start VNC and Browser
        run: |
          export DISPLAY=:99
          
          Xvfb :99 -screen 0 1920x1080x24 &
          sleep 2
          
          fluxbox &
          sleep 2
          
          google-chrome --no-sandbox --disable-dev-shm-usage --disable-gpu --new-window http://example.com &
          sleep 5
          
          x11vnc -display :99 -localhost -forever -shared -bg -nopw
          sleep 2
          
          echo "=== VNC READY ==="

      - name: Start Tunnel
        run: |
          python3 -m websockify 6080 localhost:5900 &
          sleep 3
          
          cloudflared tunnel --url http://localhost:6080 --logfile tunnel.log &
          sleep 15
          TUNNEL_URL=$(grep -o 'https://[^ ]*\.trycloudflare\.com' tunnel.log | head -1 || echo "")
          echo "Tunnel_URL=$TUNNEL_URL" >> $GITHUB_OUTPUT
          echo "=== READY ==="
          echo "Tunnel: $TUNNEL_URL"
          sleep 3600
