name: web-tunnel

on:
  workflow_dispatch:

jobs:
  browser-tunnel:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y wget gnupg curl xserver-xorg-video-dummy xvfb xfce4 xfce4-goodies x11vnc websockify python3 python3-pip

      - name: Install Chrome
        run: |
          wget -q -O - https://dl-ssl.google.com/linux/linux_signing_key.pub | sudo apt-key add -
          echo "deb [arch=amd64] http://dl.google.com/linux/chrome/deb stable main" | sudo tee /etc/apt/sources.list.d/google-chrome.list
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable

      - name: Install Cloudflare Tunnel
        run: |
          wget -q https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb
          sudo dpkg -i cloudflared-linux-amd64.deb

      - name: Start Desktop and Browser
        run: |
          export DISPLAY=:99
          
          Xvfb :99 -screen 0 1920x1080x24 &
          sleep 3
          
          export DEBIAN_FRONTEND=noninteractive
          startxfce4 &
          sleep 5
          
          google-chrome --no-sandbox --disable-dev-shm-usage --disable-gpu --remote-debugging-port=9222 &
          sleep 8
          
          nohup x11vnc -display :99 -localhost -forever -shared -bg -forever &
          sleep 2
          
          websockify --web=/usr/share/novnc 6080 localhost:5900 &
          sleep 2
          
          echo "=== READY ==="
          echo "VNC Server: localhost:5900"
          echo "noVNC: localhost:6080"

      - name: Start Tunnel
        run: |
          sleep 5
          cloudflared tunnel --url http://localhost:6080 --logfile tunnel.log &
          sleep 15
          TUNNEL_URL=$(grep -o 'https://[^ ]*\.trycloudflare\.com' tunnel.log | head -1 || echo "")
          echo "Tunnel_URL=$TUNNEL_URL" >> $GITHUB_OUTPUT
          echo "=== READY ==="
          echo "Tunnel URL: $TUNNEL_URL"
          echo "Open this URL in your browser"
          echo "Click 'Connect' - no password needed"
          sleep 3600
